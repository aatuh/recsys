<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecSys Browser Client Example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 1rem;
        color: #172026;
        background: #f7f8fa;
      }
      main {
        max-width: 42rem;
        margin: 0 auto;
      }
      form,
      ul {
        display: grid;
        gap: 0.75rem;
      }
      label {
        display: grid;
        gap: 0.25rem;
      }
      input,
      button {
        font: inherit;
        min-height: 2.75rem;
      }
      button:focus-visible,
      input:focus-visible {
        outline: 3px solid #2864d8;
        outline-offset: 2px;
      }
      li {
        padding: 0.75rem;
        background: #ffffff;
        border: 1px solid #d7dde5;
        border-radius: 6px;
      }
      [role="status"] {
        min-height: 1.5rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Recommendations</h1>
      <form id="form">
        <label>
          Anonymous user ID
          <input id="user" autocomplete="off" value="anon-demo" />
        </label>
        <button type="submit">Load</button>
      </form>
      <p id="status" role="status" aria-live="polite"></p>
      <ul id="items"></ul>
    </main>
    <script>
      const fallbackItems = ["fallback-1", "fallback-2", "fallback-3"];
      const form = document.querySelector("#form");
      const user = document.querySelector("#user");
      const status = document.querySelector("#status");
      const items = document.querySelector("#items");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.textContent = "Loading";
        items.replaceChildren();
        try {
          const response = await fetch("/v1/recommend", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Org-Id": "demo",
              "X-Request-Id": crypto.randomUUID()
            },
            body: JSON.stringify({
              surface: "home",
              k: 10,
              user: { anonymous_id: user.value.trim() }
            })
          });
          if (!response.ok) throw new Error(`status_${response.status}`);
          const payload = await response.json();
          const recs = payload.items?.map((item) => item.item_id) || [];
          render(recs.length ? recs : fallbackItems);
          status.textContent = recs.length ? "Loaded" : "Showing fallback items";
        } catch {
          render(fallbackItems);
          status.textContent = "Showing fallback items";
        }
      });

      function render(ids) {
        items.replaceChildren(...ids.map((id) => {
          const li = document.createElement("li");
          li.textContent = id;
          return li;
        }));
      }
    </script>
  </body>
</html>
