site_name: RecSys
site_description: Auditable recommendation system suite for serving, pipelines, and evaluation
repo_url: https://github.com/aatuh/recsys
edit_uri: edit/master/docs/
site_url: https://recsys.app/documentation/technical/

docs_dir: docs
site_dir: .site
use_directory_urls: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - git-revision-date-localized:
      type: timeago
      strict: false
      fallback_to_build_date: true
  - git-authors:
      strict: false
      show_email_address: false
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - /assets/analytics-config.js
  - /assets/analytics-consent.js

nav:
  - Home: index.md
  - Developer Quickstart: developer-quickstart.md
  - Local End-to-End: local-end-to-end.md
  - Architecture: architecture.md
  - Deployment: deployment.md
  - Artifacts and Pipelines: artifacts-and-pipelines.md
  - Bring Your Own Retriever: bring-your-own-retriever.md
  - Integration and Evaluation: integration.md
  - Evaluation Decisions: evaluation-decisions.md
  - Benchmarks: benchmarks.md
  - Observability: observability.md
  - Operations:
      - Overview: operations.md
      - Empty Recommendations: operations/runbooks/empty-recommendations.md
      - Stale Artifact Manifest: operations/runbooks/stale-artifact-manifest.md
      - Service Not Ready: operations/runbooks/service-not-ready.md
      - Rollback Config and Rules: operations/runbooks/rollback-config-rules.md
      - Experiment Operations: operations/runbooks/experiment-operations.md
  - Reference:
      - Overview: reference/index.md
      - API: reference/api.md
      - Configuration: reference/config.md
      - Data Contracts: reference/data-contracts.md
      - Glossary: reference/glossary.md
      - Local Workflow: reference/local-workflow.md
  - Commercial:
      - Licensing: commercial/licensing.md
      - Pricing: commercial/pricing.md
      - Procurement and Trust Review: commercial/procurement.md
  - Security: security.md
  - Release and Supply Chain: release-and-supply-chain.md
  - Support: support.md
  - Contributing: contributing.md
