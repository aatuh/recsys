name: Deploy website to GitHub Pages

on:
  push:
    branches: [master]
    tags:
      - "recsys-suite/v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-swagger-ui-tag mkdocs-material pymdown-extensions codespell \
            mkdocs-git-revision-date-localized-plugin mkdocs-git-authors-plugin \
            mkdocs-redirects mkdocs-minify-plugin mkdocs-glightbox \
            pillow cairosvg

      - name: Install site deps
        run: npm ci --prefix site

      - name: Validate Google Analytics configuration
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ vars.PUBLIC_GA_MEASUREMENT_ID }}
        run: bash scripts/validate_ga_measurement_id.sh

      - name: Build and check combined site
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ vars.PUBLIC_GA_MEASUREMENT_ID }}
        run: make site-check

      - name: Debug artifact layout
        run: |
          ls -la .site
          find .site -maxdepth 3 -name index.html -print

      - name: Prepare Pages artifact
        run: touch .site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
