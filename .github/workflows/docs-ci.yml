name: docs-ci

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/docs_linkcheck.py"
      - "scripts/docs_external_linkcheck.py"
      - "scripts/site_linkcheck.py"
      - "scripts/validate_ga_measurement_id.sh"
      - "site/**"
      - ".codespell_dictionary.txt"
      - ".codespellrc.ini"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/pages.yml"
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/docs_linkcheck.py"
      - "scripts/docs_external_linkcheck.py"
      - "scripts/site_linkcheck.py"
      - "scripts/validate_ga_measurement_id.sh"
      - "site/**"
      - ".codespell_dictionary.txt"
      - ".codespellrc.ini"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  PUBLIC_GA_MEASUREMENT_ID: "G-TEST0000"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-swagger-ui-tag mkdocs-material pymdown-extensions codespell \
            mkdocs-git-revision-date-localized-plugin mkdocs-git-authors-plugin \
            mkdocs-redirects mkdocs-minify-plugin mkdocs-glightbox \
            pillow cairosvg

      - name: Install site deps
        run: npm ci --prefix site

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: site

      - name: Combined site check
        run: make site-check

      - name: Consent E2E
        run: make site-consent-test
