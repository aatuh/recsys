      <circle cx="196" cy="32" r="9" fill="#d6b461" stroke="#d6b461"/>
      <circle cx="294" cy="32" r="9" fill="#55a86a" stroke="#55a86a"/>
      <circle cx="382" cy="32" r="9" fill="#55a86a" stroke="#55a86a"/>
    </g>
    <text x="28" y="258" fill="#5e6b73" font-family="Inter, Arial, sans-serif" font-size="18">Manifest, rules, config rollback ready</text>
