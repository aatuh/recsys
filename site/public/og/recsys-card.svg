<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">RecSys social card</title>
  <desc id="desc">A product dashboard showing evaluation gates, artifact rollout, and rollback readiness.</desc>
  <rect width="1200" height="630" fill="#f4f7f5"/>
  <rect x="64" y="58" width="1072" height="514" rx="28" fill="#ffffff" stroke="#d4ded9" stroke-width="2"/>
  <rect x="64" y="58" width="1072" height="86" rx="28" fill="#172026"/>
  <circle cx="107" cy="101" r="10" fill="#e15d4f"/>
  <circle cx="139" cy="101" r="10" fill="#e6bd4b"/>
  <circle cx="171" cy="101" r="10" fill="#55a86a"/>
