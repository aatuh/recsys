      <text x="20" y="58" fill="#172026" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">97.8%</text>
    </g>
    <g transform="translate(228 80)">
      <rect width="170" height="72" rx="12" fill="#f9f1dc" stroke="#d6b461"/>
      <text x="20" y="30" fill="#735f25" font-family="Inter, Arial, sans-serif" font-size="16">Guardrails</text>
      <text x="20" y="58" fill="#172026" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Hold</text>
    </g>
    <g transform="translate(28 184)" fill="none" stroke-width="3">
