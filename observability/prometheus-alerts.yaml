groups:
  - name: recsys-service
    rules:
      - alert: RecSysHighErrorRate
        expr: |
          sum(rate(recsys_recommendation_requests_total{outcome!="success"}[5m]))
            / clamp_min(sum(rate(recsys_recommendation_requests_total[5m])), 1) > 0.01
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RecSys recommendation error rate is elevated
          description: More than 1% of recommendation requests are failing or being rejected.

      - alert: RecSysHighEmptyRecommendationRate
        expr: |
          sum(rate(recsys_recommendation_requests_total{outcome="success",empty="true"}[10m]))
            / clamp_min(sum(rate(recsys_recommendation_requests_total{outcome="success"}[10m])), 1) > 0.02
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: RecSys empty recommendation rate is elevated
          description: More than 2% of successful recommendation responses are empty.

      - alert: RecSysHighP95Latency
        expr: |
          histogram_quantile(0.95, sum(rate(recsys_recommendation_latency_seconds_bucket[5m])) by (le, endpoint)) > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RecSys p95 latency is elevated
          description: p95 recommendation latency is above 250 ms for at least 10 minutes.

      - alert: RecSysStaleArtifactManifest
        expr: recsys_artifact_manifest_age_seconds > 900
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: RecSys artifact manifest is stale
          description: The most recently loaded artifact manifest is older than 15 minutes.

      - alert: RecSysArtifactLoadFailures
        expr: sum(rate(recsys_artifact_load_failures_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RecSys artifact load failures detected
          description: The API is failing to load artifact or manifest data.
